version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # DATABASES
  # ═══════════════════════════════════════════════════════════════
  
  logistock-db:
    image: mysql:8
    container_name: logistock_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: logistock
      MYSQL_USER: logistock
      MYSQL_PASSWORD: logistock123
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - logistock-net
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-iam:
    image: postgres:15-alpine
    container_name: logistock_postgres_iam
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - logistock-net
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # AUTHENTICATION & AUTHORIZATION
  # ═══════════════════════════════════════════════════════════════

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: logistock_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-iam:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: logistockadmin
      KC_PROXY: passthrough
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres-iam:
        condition: service_healthy
    networks:
      - logistock-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: ["start-dev"]

  localstack:
    image: localstack/localstack:3.0.0
    container_name: logistock_localstack
    environment:
      SERVICES: iam,s3,ec2,sts,kms
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-west-1
      LOCALSTACK_HOSTNAME: localstack
      LOCALSTACK_DOCKER_NETWORK: logistock-net
      TMPDIR: /tmp/localstack
      LOCALSTACK_AUTH_TOKEN: ""
      SKIP_INFRA_VALIDATION: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - localstack-data:/tmp/localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    networks:
      - logistock-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  opa:
    image: openpolicyagent/opa:latest
    container_name: logistock_opa
    ports:
      - "8181:8181"
    networks:
      - logistock-net
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  vault:
    image: hashicorp/vault:latest
    container_name: logistock_vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_API_ADDR: "http://vault:8200"
      VAULT_ADDRESS: "http://vault:8200"
      SKIP_SETCAP: "true"
    ports:
      - "8200:8200"
    networks:
      - logistock-net
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/v1/sys/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure
    command: server -dev

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: logistock_oauth2_proxy
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://keycloak:8080/realms/logistock
      OAUTH2_PROXY_CLIENT_ID: logistock-proxy
      OAUTH2_PROXY_CLIENT_SECRET: proxy-secret-change-me
      OAUTH2_PROXY_COOKIE_SECRET: "123456789012345678901234567890ab"
      OAUTH2_PROXY_COOKIE_REFRESH: "1h"
      OAUTH2_PROXY_COOKIE_EXPIRE: "168h"
      OAUTH2_PROXY_UPSTREAMS: "http://logistock-web:80"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REDIRECT_URL: "http://localhost:4180/oauth2/callback"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
    ports:
      - "4180:4180"
    depends_on:
      - keycloak
    networks:
      - logistock-net
    restart: on-failure

  adminer:
    image: adminer:latest
    container_name: logistock_adminer
    ports:
      - "8081:8080"
    depends_on:
      - logistock-db
      - postgres-iam
    networks:
      - logistock-net

  # ═══════════════════════════════════════════════════════════════
  # LOGISTOCK SERVICES
  # ═══════════════════════════════════════════════════════════════

  logistock-web:
    image: nginx:alpine
    container_name: logistock_web
    ports:
      - "5000:80"
    volumes:
      - ./nginx-web.conf:/etc/nginx/conf.d/default.conf
      - ./web:/var/www/html
    networks:
      - logistock-net
    depends_on:
      - logistock-api

  logistock-api:
    image: nginx:alpine
    container_name: logistock_api
    ports:
      - "5001:80"
    volumes:
      - ./nginx-api.conf:/etc/nginx/conf.d/default.conf
      - ./api:/var/www/html
    networks:
      - logistock-net

  logistock-admin:
    image: nginx:alpine
    container_name: logistock_admin
    ports:
      - "5002:80"
    volumes:
      - ./nginx-admin.conf:/etc/nginx/conf.d/default.conf
      - ./admin:/var/www/html
    networks:
      - logistock-net

  logistock-monitoring:
    image: prom/prometheus:latest
    container_name: logistock_monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - logistock-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  logistock-bastion:
    image: alpine:latest
    container_name: logistock_bastion
    networks:
      - logistock-net
    ports:
      - "2222:22"
    command: >
      sh -c "
        apk add --no-cache openssh openssh-keygen openssh-server openssh-client
        mkdir -p /root/.ssh
        ssh-keygen -A
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        echo 'root:root' | chpasswd
        /usr/sbin/sshd -D
      "
    restart: on-failure

  logistock-nas:
    image: alpine:latest
    container_name: logistock_nas
    networks:
      - logistock-net
    volumes:
      - nas-data:/mnt/nas
    command: tail -f /dev/null
    restart: on-failure

  logistock-backup:
    image: alpine:latest
    container_name: logistock_backup
    networks:
      - logistock-net
    volumes:
      - backup-data:/mnt/backup
    command: tail -f /dev/null
    restart: on-failure

  logistock-firewall:
    image: alpine:latest
    container_name: logistock_firewall
    networks:
      - logistock-net
    command: >
      sh -c "
        apk add --no-cache iptables
        echo 'Firewall service running...'
        tail -f /dev/null
      "
    restart: on-failure

# ═══════════════════════════════════════════════════════════════
# NETWORKS & VOLUMES
# ═══════════════════════════════════════════════════════════════

networks:
  logistock-net:
    driver: bridge

volumes:
  db-data:
    driver: local
  postgres-data:
    driver: local
  localstack-data:
    driver: local
  nas-data:
    driver: local
  backup-data:
    driver: local